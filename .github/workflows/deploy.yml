name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd ~/folio/Folio

            echo "=== 코드 업데이트 ==="
            git pull origin main

            echo "=== Backend 의존성 설치 ==="
            cd backend
            npm install --production
            cd ..

            echo "=== AI Server 의존성 설치 ==="
            source .venv/bin/activate
            pip install -q fastapi "uvicorn[standard]" pdfplumber easyocr openai python-dotenv pydantic python-multipart
            deactivate

            echo "=== Frontend 빌드 ==="
            cd Web
            npm install
            npm run build
            cd ..

            echo "=== PM2 서비스 재시작 ==="
            pm2 reload backend || pm2 start backend/src/index.js --name backend
            pm2 reload ai_server || pm2 start --name ai_server --interpreter .venv/bin/python -- -m uvicorn main:app --host 0.0.0.0 --port 8000

            pm2 save

            echo "=== Nginx 리로드 ==="
            sudo systemctl reload nginx

            echo "=== 배포 완료 ==="
            pm2 list
